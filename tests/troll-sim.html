<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Troll Assignment Simulation</title>
  <script src="../roles.js"></script>
  <script src="../mafia-role-assigner.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Courier New", monospace; background: #0f0f1a; color: #cdd6f4; padding: 32px; }
    h1 { color: #cba6f7; margin-bottom: 6px; font-size: 1.4em; }
    .subtitle { color: #6c7086; font-size: 0.85em; margin-bottom: 20px; }
    .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .controls label { color: #a6adc8; font-size: 0.88em; }
    .controls input[type=number] {
      background: #1e1e2e; border: 1px solid #45475a; border-radius: 6px;
      color: #cdd6f4; padding: 6px 10px; font-family: inherit; font-size: 0.9em; width: 110px; outline: none;
    }
    .controls input[type=number]:focus { border-color: #cba6f7; }
    .controls button {
      background: #cba6f7; color: #1e1e2e; border: none; border-radius: 6px;
      padding: 7px 20px; font-family: inherit; font-size: 0.9em; font-weight: bold; cursor: pointer;
    }
    .controls button:hover { background: #d4b4ff; }
    .controls button:disabled { background: #45475a; color: #7f849c; cursor: default; }
    .config-box {
      background: #1e1e2e; border: 1px solid #313244; border-radius: 8px;
      padding: 14px 18px; margin-bottom: 20px; font-size: 0.85em; color: #a6adc8;
    }
    .config-box span { color: #89b4fa; }
    table { width: 100%; max-width: 740px; border-collapse: collapse; }
    th { text-align: left; padding: 8px 14px; color: #7f849c; font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #313244; }
    td { padding: 7px 14px; border-bottom: 1px solid #1e1e2e; font-size: 0.91em; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e1e2e; }
    .name-target    { color: #f38ba8; font-weight: bold; }
    .name-whitelist { color: #89dceb; font-weight: bold; }
    .name-outsider  { color: #a6adc8; }
    .tag { display: inline-block; font-size: 0.66em; padding: 1px 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
    .tag-target    { background: #3d1a1a; color: #f38ba8; }
    .tag-whitelist { background: #0d2a30; color: #89dceb; }
    .tag-outsider  { background: #222233; color: #7f849c; }
    .bar-wrap { display: inline-block; width: 160px; background: #313244; border-radius: 4px; height: 10px; vertical-align: middle; margin-right: 8px; position: relative; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-target    { background: #f38ba8; }
    .bar-whitelist { background: #89dceb; }
    .bar-outsider  { background: #585b70; }
    .nat-line { color: #45475a; font-size: 0.8em; margin-left: 4px; }
    .legend { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; font-size: 0.82em; color: #a6adc8; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    #status { color: #89b4fa; margin-bottom: 16px; font-size: 0.88em; min-height: 1.4em; }
    .footer { margin-top: 20px; color: #45475a; font-size: 0.78em; }
    .pct { min-width: 44px; display: inline-block; }
    .count { color: #6c7086; font-size: 0.85em; }
  </style>
</head>
<body>

<h1>Troll Assignment Simulation</h1>
<p class="subtitle">Simulates role assignment over 10-game sessions to show real mafia probability per player.</p>

<div class="controls">
  <label for="sessionsInput">Sessions to run:</label>
  <input type="number" id="sessionsInput" value="100" min="100" max="500000" step="1000">
  <button id="runBtn" onclick="runSim()">Run</button>
</div>

<div id="config-box" class="config-box"></div>

<div class="legend">
  <span><span class="legend-dot" style="background:#f38ba8"></span>Mafia target (former whitelist)</span>
  <span><span class="legend-dot" style="background:#89dceb"></span>Protected former target</span>
  <span><span class="legend-dot" style="background:#585b70"></span>Neutral</span>
  <span style="color:#45475a">| grey marker = natural rate</span>
</div>

<div id="status"></div>
<div id="results"></div>
<div class="footer" id="footer"></div>

<script>
  var PLAYERS = ["Mehran","Naser","Farzaneh","Mohammad","Behnam","Payam","Mahdi","Mahtab","Setareh","Gisoo","Artin","Golsa","Masoud","Ghasem"];
  var N = PLAYERS.length;
  // 14 players: 5 non-town + 9 town
  var POOL = ["mafiaBoss","mafia","mafia","mafia","mafia","doctor","detective","citizen","citizen","citizen","citizen","citizen","citizen","citizen"];
  var BAD_COUNT = POOL.filter(function(r) { return roles[r] && roles[r].teamFa !== "شهر"; }).length;
  var NATURAL_RATE = BAD_COUNT / N;
  var GAMES = 10;

  function runSim() {
    var raw = parseInt(document.getElementById("sessionsInput").value, 10);
    var SESSIONS = (raw && raw > 0) ? raw : 100;
    var btn = document.getElementById("runBtn");
    btn.disabled = true;
    document.getElementById("status").textContent = "Running " + SESSIONS.toLocaleString() + " sessions...";
    document.getElementById("results").innerHTML = "";
    document.getElementById("footer").textContent = "";

    setTimeout(function() {
      var trollCfg = MafiaFairAssign._trollConfig;
      var totalMafia = new Array(N).fill(0);
      var t0 = performance.now();

      for (var s = 0; s < SESSIONS; s++) {
        var hist = {};
        for (var pi = 0; pi < N; pi++) hist[PLAYERS[pi]] = [];
        MafiaFairAssign.init({ getLegacyRecord: (function(h) { return function(name) { return { recentGames: h[name] || [] }; }; })(hist) });
        MafiaFairAssign.configure({ groupPickMode: "deficit" });
        for (var g = 0; g < GAMES; g++) {
          var asgn = MafiaFairAssign.buildAssignment(POOL, PLAYERS, { roles: roles });
          if (!asgn) continue;
          for (var i = 0; i < N; i++) {
            var rid = asgn[i];
            if (roles[rid] && roles[rid].teamFa !== "شهر") totalMafia[i]++;
            hist[PLAYERS[i]].push({ roleId: rid });
          }
        }
      }

      var elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      var totalGames = SESSIONS * GAMES;

      var cfgHtml = "<b>Pool:</b> <span>" + BAD_COUNT + " mafia / " + (N - BAD_COUNT) + " city</span> &nbsp;|&nbsp; "
        + "<b>Players:</b> <span>" + N + "</span> &nbsp;|&nbsp; "
        + "<b>Natural rate:</b> <span>" + (NATURAL_RATE * 100).toFixed(1) + "%</span> &nbsp;|&nbsp; "
        + "<b>Troll prob:</b> <span>" + (trollCfg.prob * 100).toFixed(0) + "%</span> &nbsp;|&nbsp; "
        + "<b>Troll system:</b> <span>" + (trollCfg.enabled ? "ON" : "OFF") + "</span>"
        + (!trollCfg.enabled || trollCfg.prob === 0 ? " &nbsp;<span style='color:#f38ba8'>(troll OFF)</span>" : "");
      document.getElementById("config-box").innerHTML = cfgHtml;

      var rows = PLAYERS.map(function(name, i) {
        var isTarget = trollCfg.isTarget(name);
        var isWhite  = trollCfg.isWhitelisted(name);
        return { name: name, avg: totalMafia[i] / SESSIONS, rate: totalMafia[i] / totalGames, isTarget: isTarget, isWhite: isWhite };
      }).sort(function(a, b) { return b.rate - a.rate; });

      var html = "<table><thead><tr><th>#</th><th>Player</th><th colspan='2'>Mafia rate</th><th>Avg / 10 games</th></tr></thead><tbody>";
      rows.forEach(function(r, rank) {
        var cls, barCls, tagCls, tagLbl;
        if (r.isTarget)      { cls = "name-target";    barCls = "bar-target";    tagCls = "tag-target";    tagLbl = "mafia target"; }
        else if (r.isWhite)  { cls = "name-whitelist"; barCls = "bar-whitelist"; tagCls = "tag-whitelist"; tagLbl = "protected"; }
        else                 { cls = "name-outsider";  barCls = "bar-outsider";  tagCls = "tag-outsider";  tagLbl = "neutral"; }
        var pct  = (r.rate * 100).toFixed(1);
        var barW = Math.round(r.rate * 160);
        var natW = Math.round(NATURAL_RATE * 160);
        html += "<tr>"
          + "<td style='color:#45475a'>" + (rank + 1) + "</td>"
          + "<td class='" + cls + "'>" + r.name + "<span class='tag " + tagCls + "'>" + tagLbl + "</span></td>"
          + "<td><div class='bar-wrap'>"
            + "<div class='bar-fill " + barCls + "' style='width:" + barW + "px'></div>"
            + "<div style='position:absolute;top:0;left:" + natW + "px;width:2px;height:100%;background:#45475a;border-radius:1px'></div>"
          + "</div></td>"
          + "<td><span class='pct'>" + pct + "%</span><span class='nat-line'> (natural " + (NATURAL_RATE * 100).toFixed(1) + "%)</span></td>"
          + "<td>~<b>" + r.avg.toFixed(1) + "</b> <span class='count'>/ 10</span></td>"
          + "</tr>";
      });
      html += "</tbody></table>";

      document.getElementById("results").innerHTML = html;
      document.getElementById("status").textContent = "Done - " + SESSIONS.toLocaleString() + " sessions x " + GAMES + " games each.";
      document.getElementById("footer").textContent = "Computed in " + elapsed + "s  |  " + totalGames.toLocaleString() + " total games";
      btn.disabled = false;
    }, 20);
  }

  runSim();
</script>
</body>
</html>
